<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>새싹이 - SeSAC AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --lime: #aaee00;
      --lime-dark: #8fcc00;
      --lime-soft: #eefacc;
      --bg: #f2f3ee;
      --card: #ffffff;
      --border: #e2e4da;
      --text: #1a1a12;
      --muted: #7a7d6e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans KR", sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-wrap {
      width: 100%;
      max-width: 680px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    }

    /* ── 헤더 ── */
    .chat-header {
      background: var(--lime);
      padding: 16px 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      border-bottom: 1.5px solid var(--lime-dark);
    }
    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px; height: 34px;
      background: rgba(0,0,0,0.08);
      border-radius: 10px;
      color: #1a1a12;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .back-btn:hover { background: rgba(0,0,0,0.15); }
    .bot-avatar {
      width: 42px; height: 42px;
      background: #fff;
      border: 2px solid var(--lime-dark);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .bot-info .name {
      font-size: 1rem;
      font-weight: 800;
      color: #1a1a12;
    }
    .bot-info .status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      color: #3a5a00;
      font-weight: 500;
      margin-top: 1px;
    }
    .status-dot-green {
      width: 7px; height: 7px;
      background: #2d8a00;
      border-radius: 50%;
    }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header-badge {
      background: rgba(0,0,0,0.1);
      color: #1a1a12;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
    }

    /* ── 메시지 영역 ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: var(--bg);
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* 날짜 구분선 */
    .date-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0;
      color: var(--muted);
      font-size: 0.75rem;
    }
    .date-divider::before,
    .date-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* 말풍선 row */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: slideUp 0.2s ease;
    }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-row + .msg-row { margin-top: 2px; }
    .msg-row.gap-top { margin-top: 16px; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 아바타 */
    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--lime);
      border: 1.5px solid var(--lime-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem;
      flex-shrink: 0;
    }
    .msg-row.user .avatar { display: none; }

    /* 말풍선 + 시간 묶음 */
    .bubble-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-width: 68%;
    }
    .msg-row.user .bubble-group { align-items: flex-end; }
    .msg-row.bot .bubble-group { align-items: flex-start; }

    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      line-height: 1.65;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-row.user .bubble {
      background: var(--lime);
      color: #1a1a12;
      border-bottom-right-radius: 4px;
      font-weight: 500;
    }
    .msg-row.bot .bubble {
      background: var(--card);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1.5px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .time {
      font-size: 0.68rem;
      color: var(--muted);
      padding: 0 4px;
    }

    /* 로딩 점 */
    .loading-dots { display: flex; align-items: center; gap: 4px; padding: 2px 0; }
    .loading-dots span {
      display: block;
      width: 7px; height: 7px;
      background: var(--lime-dark);
      border-radius: 50%;
      animation: boing 1.1s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.18s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes boing {
      0%, 75%, 100% { transform: translateY(0); }
      35%           { transform: translateY(-7px); }
    }

    /* ── 입력 영역 ── */
    .chat-input-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      background: var(--card);
      border-top: 1.5px solid var(--border);
      flex-shrink: 0;
    }
    #userInput {
      flex: 1;
      padding: 11px 18px;
      border: 1.5px solid var(--border);
      border-radius: 24px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s, background 0.2s;
    }
    #userInput::placeholder { color: #aab0a0; }
    #userInput:focus {
      border-color: var(--lime-dark);
      background: #fff;
    }
    #sendBtn {
      width: 44px; height: 44px;
      background: var(--lime);
      border: 1.5px solid var(--lime-dark);
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    #sendBtn:hover { background: var(--lime-dark); transform: scale(1.06); }
    #sendBtn:active { transform: scale(0.94); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #sendBtn svg { width: 20px; height: 20px; fill: #1a1a12; }
  </style>
</head>
<body>
  <div class="chat-wrap">

    <div class="chat-header">
      <a href="/" class="back-btn" title="대시보드로">
        <svg viewBox="0 0 24 24" fill="#1a1a12" width="20" height="20">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
      </a>
      <div class="bot-avatar">🌱</div>
      <div class="bot-info">
        <div class="name">새싹이</div>
        <div class="status">
          <div class="status-dot-green"></div>
          온라인 · SeSAC AI
        </div>
      </div>
      <div class="header-right">
        <span class="header-badge">🌱 SeSAC</span>
      </div>
    </div>

    <div class="chat-messages" id="messages">
      <div class="date-divider" id="dateDivider"></div>

      <!-- 첫 인사 메시지 -->
      <div class="msg-row bot gap-top">
        <div class="avatar">🌱</div>
        <div class="bubble-group">
          <div class="bubble">안녕하세요! 저는 새싹이예요 🌱<br/>SeSAC의 AI 어시스턴트입니다.<br/>궁금한 게 있으면 뭐든 물어보세요!</div>
          <div class="time" id="greetTime"></div>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <input id="userInput" type="text" placeholder="새싹이에게 메시지 보내기..." autocomplete="off" />
      <button id="sendBtn" title="보내기">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const history = [];
    let lastRole = null;

    function getTime() {
      return new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
    }

    // 날짜 구분선 + 첫 인사 시간 세팅
    const now = new Date();
    document.getElementById("dateDivider").textContent =
      now.toLocaleDateString("ko-KR", { year: "numeric", month: "long", day: "numeric", weekday: "long" });
    document.getElementById("greetTime").textContent = getTime();

    function addMessage(text, role, isLoading = false) {
      const gapTop = lastRole !== role;
      lastRole = role;

      const row = document.createElement("div");
      row.className = `msg-row ${role}${gapTop ? " gap-top" : ""}`;

      if (role === "bot") {
        const av = document.createElement("div");
        av.className = "avatar";
        av.textContent = "🌱";
        row.appendChild(av);
      }

      const group = document.createElement("div");
      group.className = "bubble-group";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      if (isLoading) {
        bubble.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div>`;
      } else {
        bubble.textContent = text;
      }

      const time = document.createElement("div");
      time.className = "time";
      time.textContent = getTime();

      group.appendChild(bubble);
      group.appendChild(time);
      row.appendChild(group);

      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = "";
      sendBtn.disabled = true;

      addMessage(text, "user");
      history.push({ role: "user", content: text });

      const loadingBubble = addMessage("", "bot", true);

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history }),
        });
        const data = await res.json();
        const reply = data.reply || data.error;

        loadingBubble.innerHTML = "";
        loadingBubble.textContent = reply;

        if (data.reply) history.push({ role: "assistant", content: reply });
      } catch {
        loadingBubble.innerHTML = "";
        loadingBubble.textContent = "오류가 발생했습니다. 잠시 후 다시 시도해주세요.";
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) sendMessage();
    });
  </script>
</body>
</html>
